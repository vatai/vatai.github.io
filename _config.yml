plugins:
  - jekyll-include-cache
  - jekyll-remote-theme
remote_theme: "mmistakes/minimal-mistakes@4.21.0"
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum" "sunrise"
layout: splash
classes:
  - landing
  - dark-theme
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      comments: true
      share: true
      related: true
title: Projects and Research
description: Mostly CS and Math
